name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-test:
    runs-on: ubuntu-latest
    env:
      MONGODB_URI: ${{ secrets.MONGODB_URI }}
      JWT_SECRET: test-secret-key-for-ci
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      - name: Install dependencies
        run: cd backend && npm ci
      - name: Run tests
        run: cd backend && npm test

  frontend-build:
    runs-on: ubuntu-latest
    env:
      VITE_API_URL: http://localhost:5000
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: cd frontend && npm ci
      - name: Build
        run: cd frontend && npm run build

  deploy:
    needs: [backend-test, frontend-build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy Backend to Render
        run: |
          if [ -n "${{ secrets.RENDER_BACKEND_DEPLOY_HOOK }}" ]; then
            curl -X POST "${{ secrets.RENDER_BACKEND_DEPLOY_HOOK }}"
          else
            echo "Render backend deploy hook not configured, skipping."
          fi
      - name: Deploy Frontend to Render
        run: |
          if [ -n "${{ secrets.RENDER_FRONTEND_DEPLOY_HOOK }}" ]; then
            curl -X POST "${{ secrets.RENDER_FRONTEND_DEPLOY_HOOK }}"
          else
            echo "Render frontend deploy hook not configured, skipping."
          fi
